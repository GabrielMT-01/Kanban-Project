<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kanban</title>
    <script>
      try {
        var prefs = JSON.parse(localStorage.getItem("kanban.preferences.v1") || "{}");
        if (prefs.theme === "dark") document.documentElement.classList.add("dark");
        if (prefs.locale === "pt") document.documentElement.lang = "pt-BR";
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
